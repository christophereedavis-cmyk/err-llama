<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Errllama — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0c0a; --bg2: #161310; --bg3: #1f1a15;
      --border: #2e261d; --amber: #d4882a; --amber-dim: #8a5a1a;
      --amber-glow: #f0a84040; --cream: #e8dcc8; --muted: #6b5c47;
      --mono: 'IBM Plex Mono', monospace; --serif: 'Playfair Display', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: var(--bg); color: var(--cream);
      font-family: var(--mono); display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .card {
      width: 100%; max-width: 380px; padding: 40px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 0%, var(--amber-glow), transparent 60%);
      pointer-events: none;
    }
    .wordmark {
      font-family: var(--serif); font-size: 2rem; font-weight: 700;
      color: var(--amber); text-align: center; margin-bottom: 6px;
      text-shadow: 0 0 30px var(--amber-glow);
    }
    .subtitle {
      text-align: center; color: var(--muted); font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 32px;
    }
    .flash {
      background: #1a0a09; border: 1px solid #5a2020; color: #e07070;
      padding: 10px 14px; border-radius: 4px; font-size: 12px; margin-bottom: 20px;
    }
    label {
      display: block; font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--cream); font-family: var(--mono); font-size: 13px;
      padding: 10px 14px; border-radius: 4px; outline: none; margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--amber-dim); }
    input::placeholder { color: var(--muted); }
    button {
      width: 100%; background: var(--amber); border: none; color: var(--bg);
      font-family: var(--mono); font-size: 13px; font-weight: 500;
      letter-spacing: 0.08em; padding: 12px; border-radius: 4px;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #e09930; }
    .switch {
      text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted);
    }
    .switch a { color: var(--amber); text-decoration: none; }
    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Errllama</div>
    <div class="subtitle">local ai — sign in</div>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="your username" autocomplete="username" autofocus required />
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      <button type="submit">sign in</button>
    </form>
    <div class="switch">
      No account? <a href="/register">create one</a>
    </div>
  </div>
<div style="margin-top:24px; text-align:center; font-size:10px; color:var(--muted); line-height:2;">
      <a href="/about" style="color:var(--muted); text-decoration:none;">about</a>
      &nbsp;·&nbsp;
      <a href="/privacy" style="color:var(--muted); text-decoration:none;">privacy</a>
      &nbsp;·&nbsp;
      <a href="/contact" style="color:var(--muted); text-decoration:none;">contact</a>
    </div>
</body>
</html>
