<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Errllama — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0c0a; --bg2: #161310; --bg3: #1f1a15;
      --border: #2e261d; --amber: #d4882a; --amber-dim: #8a5a1a;
      --amber-glow: #f0a84040; --cream: #e8dcc8; --muted: #6b5c47;
      --mono: 'IBM Plex Mono', monospace; --serif: 'Playfair Display', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--cream);
      font-family: var(--mono); font-size: 14px; line-height: 1.8;
      padding: 60px 24px; min-height: 100vh;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    .back {
      display: inline-block; color: var(--muted); text-decoration: none;
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 40px; transition: color 0.2s;
    }
    .back:hover { color: var(--amber); }
    .wordmark {
      font-family: var(--serif); font-size: 2rem; font-weight: 700;
      color: var(--amber); margin-bottom: 6px;
      text-shadow: 0 0 30px var(--amber-glow);
    }
    .subtitle {
      font-size: 11px; color: var(--muted); letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 40px;
    }
    .flash-ok {
      background: #0a1a0a; border: 1px solid #2a5a2a; color: #70e070;
      padding: 12px 16px; border-radius: 4px; font-size: 12px; margin-bottom: 24px;
    }
    .flash-err {
      background: #1a0a09; border: 1px solid #5a2020; color: #e07070;
      padding: 12px 16px; border-radius: 4px; font-size: 12px; margin-bottom: 24px;
    }
    label {
      display: block; font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--cream); font-family: var(--mono); font-size: 13px;
      padding: 10px 14px; border-radius: 4px; outline: none; margin-bottom: 22px;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--amber-dim); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 120px; }
    select { cursor: pointer; }
    button {
      background: var(--amber); border: none; color: var(--bg);
      font-family: var(--mono); font-size: 13px; font-weight: 500;
      letter-spacing: 0.08em; padding: 12px 24px; border-radius: 4px;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #e09930; }
    .note { font-size: 11px; color: var(--muted); margin-top: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← back to errllama</a>
    <div class="wordmark">Errllama</div>
    <div class="subtitle">Contact</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="{{ 'flash-ok' if category == 'success' else 'flash-err' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <label>Your username (optional)</label>
      <input type="text" name="username" placeholder="leave blank if not registered" />

      <label>Subject</label>
      <select name="subject">
        <option value="data_request">Data request / deletion</option>
        <option value="privacy">Privacy concern</option>
        <option value="bug">Bug report</option>
        <option value="other">Other</option>
      </select>

      <label>Message</label>
      <textarea name="message" placeholder="Describe your request or question..." required></textarea>

      <button type="submit">send message</button>
    </form>
    <div class="note">We aim to respond to data requests within 7 days.</div>
  </div>
</body>
</html>
